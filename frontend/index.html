<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Workflow Orchestrator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222632;
      --border: #2e3345;
      --text: #e1e4ed;
      --text-muted: #8b90a0;
      --accent: #6c8cff;
      --accent-hover: #8aa4ff;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #f87171;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }

    header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    header p { color: var(--text-muted); font-size: 0.875rem; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }

    label.field-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.3rem; }
    .field { margin-bottom: 1rem; }

    textarea, input[type="text"], input[type="number"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 0.5rem 0.75rem; color: var(--text); font-family: var(--font); font-size: 0.85rem; transition: border-color 0.15s;
    }
    textarea { font-size: 0.85rem; resize: vertical; min-height: 100px; }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); }

    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    .config-grid .field { margin-bottom: 0; }

    button {
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
      padding: 0.6rem 1.25rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-row { display: flex; gap: 0.75rem; align-items: center; margin-top: 1rem; }

    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-pending { background: rgba(251,191,36,0.15); color: var(--warning); }
    .badge-running { background: rgba(108,140,255,0.15); color: var(--accent); }
    .badge-completed { background: rgba(74,222,128,0.15); color: var(--success); }
    .badge-failed { background: rgba(248,113,113,0.15); color: var(--error); }

    .result-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-top: 1rem; display: none; }
    .result-box.visible { display: block; }
    .result-summary { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .result-summary .wf-id { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }

    .result-section { border: 1px solid var(--border); border-radius: var(--radius); margin-top: 0.75rem; overflow: hidden; }
    .result-section summary { padding: 0.6rem 0.75rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; background: var(--surface-hover); user-select: none; list-style: none; }
    .result-section summary::before { content: '▸ '; color: var(--text-muted); }
    .result-section[open] summary::before { content: '▾ '; }
    .result-section pre { padding: 0.75rem; font-family: var(--mono); font-size: 0.75rem; line-height: 1.5; overflow-x: auto; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }

    .msg { font-size: 0.8rem; padding: 0.5rem 0.75rem; border-radius: 4px; margin-top: 0.75rem; display: none; }
    .msg.visible { display: block; }
    .msg-error { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.2); }
    .msg-info { background: rgba(108,140,255,0.1); color: var(--accent); border: 1px solid rgba(108,140,255,0.2); }

    .polling-indicator { font-size: 0.8rem; color: var(--accent); margin-top: 0.5rem; display: none; }
    .polling-indicator.visible { display: block; }

    .status-row { display: flex; align-items: center; gap: 0.75rem; }
    .status-row input { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Agentic Workflow Orchestrator</h1>
      <p>Submit workflows and get results automatically</p>
    </header>

    <!-- Submit Workflow -->
    <div class="section">
      <h2><span class="icon">📤</span> Submit Workflow</h2>

      <div class="field">
        <label class="field-label" for="workflowInput">What do you want the agents to do?</label>
        <textarea id="workflowInput" placeholder="Analyze customer feedback and generate a summary report"></textarea>
      </div>

      <details>
        <summary style="font-size:0.8rem;color:var(--text-muted);cursor:pointer;margin-bottom:0.75rem;">Optional Configuration</summary>
        <div class="config-grid" style="margin-top:0.5rem;">
          <div class="field">
            <label class="field-label" for="cfgRetries">Max Retries</label>
            <input type="number" id="cfgRetries" placeholder="3" min="0" max="10">
          </div>
          <div class="field">
            <label class="field-label" for="cfgIterations">Max Iterations</label>
            <input type="number" id="cfgIterations" placeholder="15" min="1" max="50">
          </div>
          <div class="field">
            <label class="field-label" for="cfgTimeout">Timeout (s)</label>
            <input type="number" id="cfgTimeout" placeholder="300" min="1" max="600">
          </div>
          <div class="field">
            <label class="field-label" for="cfgModel">Model</label>
            <input type="text" id="cfgModel" placeholder="llama-3.3-70b-versatile">
          </div>
        </div>
      </details>

      <div class="btn-row">
        <button id="btnSubmit" onclick="submitWorkflow()">Submit Workflow</button>
      </div>

      <div id="submitMsg" class="msg"></div>
      <div id="submitResult" class="result-box">
        <div class="result-summary">
          <span>Workflow ID:</span>
          <span class="wf-id" id="submitWfId"></span>
          <span id="submitBadge" class="badge"></span>
        </div>
        <div id="pollingIndicator" class="polling-indicator">⏳ Waiting for agents to finish...</div>
        <div id="submitDetails"></div>
      </div>
    </div>

    <!-- Check Status (still available for looking up old workflows) -->
    <div class="section">
      <h2><span class="icon">🔍</span> Look Up Workflow</h2>
      <div class="field">
        <div class="status-row">
          <input type="text" id="statusWfId" placeholder="Enter workflow ID (UUID)">
          <button id="btnStatus" onclick="checkStatus()">Check</button>
        </div>
      </div>
      <div id="statusMsg" class="msg"></div>
      <div id="statusResult" class="result-box">
        <div class="result-summary">
          <span>Status:</span>
          <span id="statusBadge" class="badge"></span>
          <span class="wf-id" id="statusWfIdDisplay"></span>
        </div>
        <div id="statusDetails"></div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = 'https://orchestrator-api-lgif.onrender.com';
  let pollTimer = null;

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg visible msg-' + type;
  }
  function hideMsg(id) { document.getElementById(id).className = 'msg'; }

  function badgeClass(status) {
    const s = (status || '').toLowerCase();
    if (s === 'completed') return 'badge badge-completed';
    if (s === 'failed') return 'badge badge-failed';
    if (s === 'running') return 'badge badge-running';
    return 'badge badge-pending';
  }

  async function submitWorkflow() {
    hideMsg('submitMsg');
    document.getElementById('submitResult').className = 'result-box';
    document.getElementById('submitDetails').innerHTML = '';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    const raw = document.getElementById('workflowInput').value.trim();
    if (!raw) { showMsg('submitMsg', 'Please describe what you want the agents to do.', 'error'); return; }

    // Accept plain text — send as string. If it looks like JSON, parse it.
    let input = raw;
    if (raw.startsWith('{') || raw.startsWith('[')) {
      try { input = JSON.parse(raw); } catch (e) { /* keep as string */ }
    }

    const config = {};
    const retries = document.getElementById('cfgRetries').value;
    const iterations = document.getElementById('cfgIterations').value;
    const timeout = document.getElementById('cfgTimeout').value;
    const model = document.getElementById('cfgModel').value.trim();
    if (retries !== '') config.maxRetries = parseInt(retries, 10);
    if (iterations !== '') config.maxIterations = parseInt(iterations, 10);
    if (timeout !== '') config.timeoutSeconds = parseInt(timeout, 10);
    if (model) config.model = model;

    const body = { input };
    if (Object.keys(config).length > 0) body.config = config;

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      const res = await fetch(API_BASE + '/workflows', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const errText = await res.text();
        showMsg('submitMsg', 'Error ' + res.status + ': ' + errText, 'error');
        return;
      }

      const data = await res.json();
      document.getElementById('submitWfId').textContent = data.workflowId;
      document.getElementById('submitBadge').textContent = data.status;
      document.getElementById('submitBadge').className = badgeClass(data.status);
      document.getElementById('submitResult').className = 'result-box visible';
      document.getElementById('pollingIndicator').className = 'polling-indicator visible';

      // Auto-poll until complete or failed
      startPolling(data.workflowId);
    } catch (err) {
      showMsg('submitMsg', 'Network error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit Workflow';
    }
  }

  function startPolling(workflowId) {
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(API_BASE + '/workflows/' + encodeURIComponent(workflowId));
        if (!res.ok) return;
        const data = await res.json();

        document.getElementById('submitBadge').textContent = data.status;
        document.getElementById('submitBadge').className = badgeClass(data.status);

        if (data.status === 'COMPLETED' || data.status === 'FAILED') {
          clearInterval(pollTimer);
          pollTimer = null;
          document.getElementById('pollingIndicator').className = 'polling-indicator';
          if (data.result) renderResult('submitDetails', data.result);
        }
      } catch (e) { /* keep polling */ }
    }, 2000);
  }

  async function checkStatus() {
    hideMsg('statusMsg');
    document.getElementById('statusResult').className = 'result-box';
    document.getElementById('statusDetails').innerHTML = '';

    const wfId = document.getElementById('statusWfId').value.trim();
    if (!wfId) { showMsg('statusMsg', 'Please enter a workflow ID.', 'error'); return; }

    const btn = document.getElementById('btnStatus');
    btn.disabled = true;
    btn.textContent = 'Checking…';

    try {
      const res = await fetch(API_BASE + '/workflows/' + encodeURIComponent(wfId));
      if (!res.ok) {
        const errText = await res.text();
        showMsg('statusMsg', 'Error ' + res.status + ': ' + errText, 'error');
        return;
      }
      const data = await res.json();
      document.getElementById('statusWfIdDisplay').textContent = data.workflowId;
      document.getElementById('statusBadge').textContent = data.status;
      document.getElementById('statusBadge').className = badgeClass(data.status);
      document.getElementById('statusResult').className = 'result-box visible';
      if ((data.status === 'COMPLETED' || data.status === 'FAILED') && data.result) {
        renderResult('statusDetails', data.result);
      }
    } catch (err) {
      showMsg('statusMsg', 'Network error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Check';
    }
  }

  function formatAsText(obj) {
    if (typeof obj === 'string') return escapeHtml(obj);
    if (typeof obj !== 'object' || obj === null) return escapeHtml(String(obj));

    // ExecutionOutput with step_results — show only the last step's output as the final answer
    if (Array.isArray(obj.step_results) && obj.step_results.length > 0) {
      var lastStep = obj.step_results[obj.step_results.length - 1];
      var output = lastStep.output || lastStep.result || '';
      return escapeHtml(String(output));
    }

    // Array — show last item
    if (Array.isArray(obj) && obj.length > 0) {
      var last = obj[obj.length - 1];
      if (typeof last === 'string') return escapeHtml(last);
      if (typeof last === 'object' && last !== null) {
        var val = last.output || last.result || last.description || '';
        if (val) return escapeHtml(String(val));
      }
      return escapeHtml(JSON.stringify(last, null, 2));
    }

    // Plain object
    return Object.entries(obj).map(function(kv) {
      var val = typeof kv[1] === 'object' ? JSON.stringify(kv[1], null, 2) : String(kv[1]);
      return kv[0] + ': ' + escapeHtml(val);
    }).join('\n');
  }

  function renderResult(containerId, result) {
    const container = document.getElementById(containerId);
    let html = '';

    // Show final output prominently — render as readable text
    const finalOutput = result.finalOutput || result.executionOutput;
    if (finalOutput) {
      const content = formatAsText(finalOutput);
      html += '<div style="margin-top:0.75rem;"><h3 style="font-size:0.85rem;font-weight:600;margin-bottom:0.5rem;color:var(--text);">Result</h3>';
      html += '<div style="padding:0.75rem;font-size:0.85rem;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface-hover);border-radius:var(--radius);border:1px solid var(--border);">' + content + '</div></div>';
    }

    // Show evaluation summary if available
    const evaluation = result.evaluation;
    if (evaluation) {
      const passed = evaluation.passed ? '✅ Passed' : '❌ Failed';
      const score = evaluation.score != null ? ' (score: ' + evaluation.score + ')' : '';
      html += '<div style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted);">' + passed + score + '</div>';
      if (evaluation.feedback) {
        html += '<div style="margin-top:0.25rem;font-size:0.8rem;color:var(--text-muted);font-style:italic;">' + escapeHtml(evaluation.feedback) + '</div>';
      }
    }

    // Collapsible detailed steps
    const steps = [
      { title: 'Plan', data: result.plan },
      { title: 'Validation Result', data: result.validationResult },
      { title: 'Execution Output', data: result.executionOutput },
      { title: 'Evaluation', data: result.evaluation },
      { title: 'Routing History', data: result.routingHistory },
      { title: 'Iterations', data: result.totalIterations },
    ];
    const hasSteps = steps.some(s => s.data !== undefined && s.data !== null);
    if (hasSteps) {
      html += '<details class="result-section" style="margin-top:0.75rem;"><summary>Show Detailed Steps</summary><div style="padding:0.5rem;">';
      for (const s of steps) {
        if (s.data === undefined || s.data === null) continue;
        const content = typeof s.data === 'object' ? JSON.stringify(s.data, null, 2) : String(s.data);
        html += '<details class="result-section"><summary>' + s.title + '</summary><pre>' + escapeHtml(content) + '</pre></details>';
      }
      html += '</div></details>';
    }

    container.innerHTML = html;
  }

  function escapeHtml(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
</script>
</body>
</html>
